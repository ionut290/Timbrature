[build]
  command = "npm run build"
  publish = "dist"
  [build.environment]
    # Ensure build-time tooling from devDependencies (e.g. vite) is installed in CI.
    NPM_FLAGS = "--include=dev"
    NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
