[build]
  command = "npm run build"
  publish = "dist"
  [build.environment]
    # Ensure build-time tooling from devDependencies (e.g. vite) is installed in CI.
    NPM_FLAGS = "--include=dev"
    NODE_VERSION = "20"
    # Use smart detection to reduce false positives for known public Firebase
    # client config values that are embedded in browser bundles.
    SECRETS_SCAN_SMART_DETECTION_ENABLED = "true"
    # Keep masked Firebase API-key prefix omission for legacy scans.
    SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIza***"
    # Ignore known Firebase declaration files that trigger false positives.
    SECRETS_SCAN_SMART_DETECTION_OMIT_FILES = "node_modules/@firebase/analytics/dist/src/global_index.d.ts,node_modules/@firebase/app/dist/app-public.d.ts"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
