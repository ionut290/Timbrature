[build]
  command = "npm run build"
  publish = "dist"

  [build.environment]
    # Ensure build-time tooling from devDependencies (e.g. vite) is installed in CI.
    NPM_FLAGS = "--include=dev"
    NODE_VERSION = "20"
    # Disable smart detection: Firebase SDK declaration files inside
    # node_modules trigger false positives (AIza...) during CI builds.
    SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"
    # Keep masked Firebase API-key prefix omission for legacy scans.
    SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIza***"
    # Ignore Firebase SDK declaration files generated in node_modules during CI.
    # These d.ts files include public example keys such as "AIza..." and can be
    # incorrectly flagged as secrets by Netlify smart detection.
    SECRETS_SCAN_SMART_DETECTION_OMIT_FILES = "node_modules/@firebase/**,node_modules/firebase/**"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
