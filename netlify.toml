[build]
  command = "npm run build"
  publish = "dist"

  [build.environment]
    # Ensure build-time tooling from devDependencies (e.g. vite) is installed in CI.
    NPM_FLAGS = "--include=dev"
    NODE_VERSION = "20"

    # Disable smart secrets detection to avoid Firebase SDK false positives in node_modules.
    SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

    # (opzionali, puoi lasciarli)
    SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIza***"
    SECRETS_SCAN_SMART_DETECTION_OMIT_FILES = "node_modules/@firebase/**,node_modules/firebase/**"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
