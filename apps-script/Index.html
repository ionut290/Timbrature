<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <?!= include('Styles'); ?>
  </head>
  <body>
    <div class="container">
      <h1>Timbrature Aziendali</h1>
      <div class="card" id="userBox"></div>

      <div class="card">
        <h2>Nuova timbratura / giornata</h2>
        <div class="actions punch-actions">
          <button id="clockInBtn" class="clock-in" type="button" onclick="clockIn()">Entrata</button>
          <button id="clockOutBtn" class="clock-out" type="button" onclick="clockOut()" disabled>Uscita</button>
        </div>
        <div class="grid">
          <label>Data
            <input type="date" id="data" readonly>
          </label>

          <label>Entrata
            <input type="time" id="entrata" readonly>
          </label>

          <label>Uscita
            <input type="time" id="uscita" readonly>
          </label>

          <label>Pausa (minuti)
            <input type="number" id="pausa" min="0" value="0">
          </label>

          <label>Causale
            <select id="causale"></select>
          </label>

          <label>Note
            <textarea id="note" rows="2" placeholder="Aggiungi dettagli se necessario"></textarea>
          </label>
        </div>

        <p id="esito" class="msg"></p>
      </div>

      <div class="card">
        <h2>Storico mese</h2>
        <div class="inline-actions">
          <input type="month" id="mese">
          <button onclick="loadMyMonth()">Ricarica</button>
        </div>
        <div class="table-wrap">
        <table class="responsive-table">
          <thead>
            <tr>
              <th>Data</th>
              <th>Entrata</th>
              <th>Uscita</th>
              <th>Pausa</th>
              <th>Causale</th>
              <th>Ore</th>
              <th>Ordinarie</th>
              <th>Straordinario</th>
              <th>Stato</th>
            </tr>
          </thead>
          <tbody id="myRows"></tbody>
        </table>
        </div>
      </div>

      <div class="card" id="managerBox" hidden>
        <h2>Approvazioni responsabile</h2>
        <div class="inline-actions">
          <button onclick="loadPending()">Aggiorna richieste</button>
        </div>
        <div class="table-wrap">
        <table class="responsive-table">
          <thead>
            <tr>
              <th>Data</th>
              <th>Dipendente</th>
              <th>Causale</th>
              <th>Ore</th>
              <th>Stato</th>
              <th>Azioni</th>
            </tr>
          </thead>
          <tbody id="pendingRows"></tbody>
        </table>
        </div>
      </div>
    </div>

    <?!= include('Scripts'); ?>
  </body>
</html>
