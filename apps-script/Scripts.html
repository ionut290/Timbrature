<script>
  let currentUser = null;
  let hasClockInForToday = false;
  let liveTicker = null;
  let latestMonthRows = [];
  let isBusy = false;
  const WEEK_CONTRACT_KEY = 'timbrature.weekly.contract';
  const CONTRACT_PRESETS = {
    EDILIZIA: {
      label: 'Edilizia industria',
      levels: {
        OP1: { label: 'Operaio 1° livello', hourlyRate: 9.8 },
        OP2: { label: 'Operaio 2° livello', hourlyRate: 11.2 },
        OP3: { label: 'Operaio 3° livello', hourlyRate: 12.7 }
      }
    },
    METALMECCANICO: {
      label: 'Metalmeccanico industria',
      levels: {
        D1: { label: 'D1', hourlyRate: 10.9 },
        C2: { label: 'C2', hourlyRate: 12.4 },
        B1: { label: 'B1', hourlyRate: 15.2 }
      }
    },
    LOGISTICA: {
      label: 'Logistica',
      levels: {
        '6J': { label: '6J', hourlyRate: 9.4 },
        '5': { label: '5° livello', hourlyRate: 10.6 },
        '4': { label: '4° livello', hourlyRate: 11.9 }
      }
    },
    AGRICOLTURA: {
      label: 'Agricoltura',
      levels: {
        '7B': { label: '7° bis (allineato a 7°)', hourlyRate: 7.09, byEmploymentType: { IND: 7.09, DET: 9.25 } },
        '7': { label: '7° livello', hourlyRate: 7.09, byEmploymentType: { IND: 7.09, DET: 9.25 } },
        '6': { label: '6° livello', hourlyRate: 8.81, byEmploymentType: { IND: 8.81, DET: 11.50 } },
        '5': { label: '5° livello', hourlyRate: 10.00, byEmploymentType: { IND: 10.00, DET: 13.05 } },
        '4': { label: '4° livello', hourlyRate: 10.61, byEmploymentType: { IND: 10.61, DET: 13.84 } },
        '3': { label: '3° livello', hourlyRate: 11.14, byEmploymentType: { IND: 11.14, DET: 14.54 } }
      }
    }
  };

  function id(x) { return document.getElementById(x); }

  function nowDateISO() {
    return new Date().toISOString().slice(0, 10);
  }

  function nowTimeHHMM() {
    const now = new Date();
    return `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
  }

  function setPunchButtons(inProgress) {
    hasClockInForToday = !!inProgress;
    id('clockInBtn').disabled = isBusy || hasClockInForToday;
    id('clockOutBtn').disabled = isBusy || !hasClockInForToday;
  }

  function setBusy(busy) {
    isBusy = !!busy;

    const busyIndicator = id('busyIndicator');
    if (busyIndicator) {
      busyIndicator.textContent = isBusy ? 'Operazione in corso...' : '';
      busyIndicator.hidden = !isBusy;
    }

    const refreshMonthBtn = document.querySelector('button[onclick="loadMyMonth()"]');
    if (refreshMonthBtn) refreshMonthBtn.disabled = isBusy;

    document.querySelectorAll('#pendingRows button').forEach((btn) => {
      btn.disabled = isBusy;
    });

    setPunchButtons(hasClockInForToday);
  }

  function showMsg(message, type = 'ok') {
    id('esito').className = `msg ${type}`;
    id('esito').textContent = message;
  }
  function readWeeklyContract() {
    try {
      return JSON.parse(localStorage.getItem(WEEK_CONTRACT_KEY) || 'null') || null;
    } catch (e) {
      return null;
    }
  }
  function writeWeeklyContract(value) {
    localStorage.setItem(WEEK_CONTRACT_KEY, JSON.stringify(value));
  }
  function getPresetRate(template, level, employmentType = 'IND') {
    const preset = CONTRACT_PRESETS[template]?.levels?.[level] || null;
    if (!preset) return null;
    const typeKey = String(employmentType || 'IND').toUpperCase();
    const typedRate = preset.byEmploymentType?.[typeKey];
    if (!Number.isFinite(typedRate)) return preset;
    return { ...preset, hourlyRate: typedRate };
  }
  function getEffectiveHourlyRate() {
    const manualRate = Number(id('hourlyRate').value || 0);
    if (manualRate > 0) return manualRate;
    return Number(getPresetRate(id('contractTemplate').value, id('contractLevel').value, id('contractEmploymentType').value)?.hourlyRate || 0);
  }
  function parseTimeToMinutes(hhmm) {
    if (!hhmm) return null;
    const [h, m] = String(hhmm).split(':').map(Number);
    if (Number.isNaN(h) || Number.isNaN(m)) return null;
    return h * 60 + m;
  }
  function buildContractTemplateOptions() {
    id('contractTemplate').innerHTML = Object.entries(CONTRACT_PRESETS)
      .map(([key, value]) => `<option value="${key}">${value.label}</option>`)
      .join('');
  }
  function buildContractLevelOptions() {
    const selectedTemplate = id('contractTemplate').value;
    const levels = CONTRACT_PRESETS[selectedTemplate]?.levels || {};
    const prev = id('contractLevel').value;
    id('contractLevel').innerHTML = Object.entries(levels)
      .map(([key, value]) => `<option value="${key}">${value.label}</option>`)
      .join('');
    if (levels[prev]) id('contractLevel').value = prev;
    updateContractHint();
  }
  function updateContractHint() {
    const employmentType = id('contractEmploymentType').value || 'IND';
    const preset = getPresetRate(id('contractTemplate').value, id('contractLevel').value, employmentType);
    if (!preset) {
      id('contractHint').textContent = 'Seleziona contratto e livello.';
      return;
    }
    id('contractHint').textContent = `Paga suggerita (${employmentType}): € ${Number(preset.hourlyRate).toFixed(2)}/h. Se paghi diversamente, imposta la paga manuale.`;
  }
  function saveWeeklyContract() {
    const payload = {
      template: id('contractTemplate').value,
      level: id('contractLevel').value,
      employmentType: id('contractEmploymentType').value,
      hourlyRate: Number(id('hourlyRate').value || 0)
    };
    writeWeeklyContract(payload);
    showMsg('Contratto settimanale salvato su questo dispositivo.', 'ok');
    updateLiveEarnings();
  }
  function loadWeeklyContract(silent = false) {
    const contract = readWeeklyContract();
    if (!contract) {
      if (!silent) showMsg('Nessun contratto settimanale salvato.', 'err');
      return;
    }
    id('contractTemplate').value = contract.template || id('contractTemplate').value;
    buildContractLevelOptions();
    id('contractLevel').value = contract.level || id('contractLevel').value;
    id('contractEmploymentType').value = contract.employmentType || 'IND';
    id('hourlyRate').value = Number(contract.hourlyRate || 0);
    updateContractHint();
    updateLiveEarnings();
    showMsg('Contratto settimanale caricato.', 'ok');
  }

  function setUserBox(user) {
    id('userBox').innerHTML = `<strong>${user.nome}</strong> (${user.ruolo}) - ${user.email}`;
  }

  function initCausali(causali) {
    id('causale').innerHTML = causali
      .map(c => `<option value="${c.codice}">${c.codice} - ${c.descrizione}</option>`)
      .join('');
  }

  function loadDashboard() {
    google.script.run
      .withSuccessHandler((res) => {
        currentUser = res.user;
        setUserBox(res.user);
        id('data').value = res.today;
        initCausali(res.causali);

        const now = new Date();
        id('mese').value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;

        if (['responsabile', 'admin'].includes(res.user.ruolo)) {
          id('managerBox').hidden = false;
        }

        loadMyMonth(() => {
          detectTodayPunchState();
          if (!id('managerBox').hidden) loadPending();
        });
      })
      .withFailureHandler((e) => showMsg(e.message || String(e), 'err'))
      .getDashboard();
  }

  function collectPayload(stato) {
    return {
      data: id('data').value,
      entrata: id('entrata').value,
      uscita: id('uscita').value,
      pausaMinuti: id('pausa').value,
      causale: id('causale').value,
      note: id('note').value,
      stato
    };
  }

  function saveRecord(stato, onDone) {
    if (isBusy) return;
    setBusy(true);

    google.script.run
      .withSuccessHandler((res) => {
        setBusy(false);
        showMsg(`Salvato. Ore: ${res.calcolo.worked}, Ordinarie: ${res.calcolo.ord}, Straordinario: ${res.calcolo.stra}`, 'ok');
        loadMyMonth(() => {
          detectTodayPunchState();
          if (!id('managerBox').hidden) loadPending();
          if (typeof onDone === 'function') onDone(res);
        });
      })
      .withFailureHandler((e) => {
        setBusy(false);
        showMsg(e.message || String(e), 'err');
      })
      .createOrUpdateDay(collectPayload(stato));
  }

  function loadMyMonth(onDone) {
    if (isBusy) return;
    setBusy(true);

    const month = id('mese').value;
    google.script.run
      .withSuccessHandler((rows) => {
        id('myRows').innerHTML = rows.map(r => `
          <tr>
            <td data-label="Data">${r.data || ''}</td>
            <td data-label="Entrata">${r.entrata || ''}</td>
            <td data-label="Uscita">${r.uscita || ''}</td>
            <td data-label="Pausa">${r.pausa || 0}</td>
            <td data-label="Causale">${r.causale || ''}</td>
            <td data-label="Ore">${r.ore || 0}</td>
            <td data-label="Ordinarie">${r.ord || 0}</td>
            <td data-label="Straordinario">${r.stra || 0}</td>
            <td data-label="Stato">${r.stato || ''}</td>
          </tr>`).join('');
        latestMonthRows = rows;
        updateLiveEarnings(rows);
        setBusy(false);
        if (typeof onDone === 'function') onDone(rows);
      })
      .withFailureHandler((e) => {
        setBusy(false);
        showMsg(e.message || String(e), 'err');
      })
      .getMyMonthData(month);
  }
  function computeTodayWorkedHours() {
    const entrata = parseTimeToMinutes(id('entrata').value);
    if (entrata == null) return 0;
    const uscita = parseTimeToMinutes(id('uscita').value || nowTimeHHMM());
    if (uscita == null || uscita < entrata) return 0;
    const pausa = Math.max(Number(id('pausa').value || 0), 0);
    return Math.max((uscita - entrata - pausa) / 60, 0);
  }
  function updateLiveEarnings(rowsOverride) {
    const monthRows = Array.isArray(rowsOverride) ? rowsOverride : latestMonthRows;
    const rate = getEffectiveHourlyRate();
    const todayWorked = computeTodayWorkedHours();
    const dayEarn = +(todayWorked * rate).toFixed(2);
    id('liveWorkedHours').textContent = `Ore oggi: ${todayWorked.toFixed(2)}`;
    id('liveDayEarnings').textContent = `Guadagno oggi: € ${dayEarn.toFixed(2)}`;
    const monthTotal = monthRows.reduce((sum, row) => sum + (Number(row.ore || 0) * rate), 0);
    const today = id('data').value || nowDateISO();
    const hasTodayRow = monthRows.some((r) => String(r.data || '') === today);
    const total = hasTodayRow ? monthTotal + (dayEarn - (Number(monthRows.find((r)=>String(r.data||'')===today)?.ore || 0) * rate)) : monthTotal + dayEarn;
    id('liveTotalEarnings').textContent = `Guadagno totale mese (live): € ${Number(total).toFixed(2)}`;
  }

  function detectTodayPunchState(rows) {
    const list = Array.isArray(rows) ? rows : [];
    const today = id('data').value || nowDateISO();
    const todayRow = list.find((r) => String(r.data || '') === today);

    if (todayRow?.entrata) id('entrata').value = todayRow.entrata;
    if (todayRow?.uscita) id('uscita').value = todayRow.uscita;
    if (!todayRow?.entrata) id('entrata').value = '';
    if (!todayRow?.uscita) id('uscita').value = '';

    setPunchButtons(Boolean(todayRow?.entrata && !todayRow?.uscita));
  }

  function clockIn() {
    id('data').value = nowDateISO();
    id('entrata').value = nowTimeHHMM();
    id('uscita').value = '';
    id('note').value = id('note').value || `Contratto ${id('contractTemplate').value || ''} ${id('contractLevel').value || ''}`.trim();
    setPunchButtons(true);
    saveRecord('BOZZA');
  }

  function clockOut() {
    if (!hasClockInForToday) {
      showMsg('Prima premi Entrata.', 'err');
      return;
    }
    id('uscita').value = nowTimeHHMM();
    saveRecord('INVIATO', () => setPunchButtons(false));
  }

  function loadPending(onDone) {
    if (isBusy) return;
    setBusy(true);

    const month = id('mese').value;
    google.script.run
      .withSuccessHandler((rows) => {
        id('pendingRows').innerHTML = rows.map(r => `
          <tr>
            <td data-label="Data">${r.data}</td>
            <td data-label="Dipendente">${r.dipendente}</td>
            <td data-label="Causale">${r.causale}</td>
            <td data-label="Ore">${r.ore}</td>
            <td data-label="Stato">${r.stato}</td>
            <td data-label="Azioni" class="actions-cell">
              <button onclick="approve('${r.id}', true)">Approva</button>
              <button class="secondary" onclick="approve('${r.id}', false)">Rifiuta</button>
            </td>
          </tr>`).join('');
        setBusy(false);
        if (typeof onDone === 'function') onDone(rows);
      })
      .withFailureHandler((e) => {
        setBusy(false);
        showMsg(e.message || String(e), 'err');
      })
      .getPendingForManager(month);
  }

  function approve(idRecord, approved) {
    if (isBusy) return;

    let motivo = '';
    if (!approved) {
      motivo = prompt('Motivo rifiuto:', 'Dati non corretti') || 'Rifiutato';
    }

    setBusy(true);

    google.script.run
      .withSuccessHandler(() => {
        setBusy(false);
        showMsg('Operazione completata.', 'ok');
        loadPending(() => loadMyMonth());
      })
      .withFailureHandler((e) => {
        setBusy(false);
        showMsg(e.message || String(e), 'err');
      })
      .approveRecord(idRecord, approved, motivo);
  }

  window.onload = () => {
    id('data').value = nowDateISO();

    const busyIndicator = document.createElement('small');
    busyIndicator.id = 'busyIndicator';
    busyIndicator.className = 'small';
    busyIndicator.style.marginLeft = '8px';
    busyIndicator.hidden = true;
    id('esito').insertAdjacentElement('afterend', busyIndicator);

    setPunchButtons(false);
    buildContractTemplateOptions();
    buildContractLevelOptions();
    id('contractTemplate').addEventListener('change', buildContractLevelOptions);
    id('contractLevel').addEventListener('change', updateContractHint);
    id('contractEmploymentType').addEventListener('change', updateContractHint);
    id('hourlyRate').addEventListener('input', updateLiveEarnings);
    ['entrata', 'uscita', 'pausa'].forEach((field) => id(field).addEventListener('change', updateLiveEarnings));
    loadWeeklyContract(true);
    loadDashboard();
    if (liveTicker) clearInterval(liveTicker);
    liveTicker = setInterval(updateLiveEarnings, 1000);
  };

  window.saveWeeklyContract = saveWeeklyContract;
  window.loadWeeklyContract = loadWeeklyContract;
</script>
