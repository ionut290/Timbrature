<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Timbrature Cloud</title>
    <style>
      :root {
        --bg: #f4f6f8;
        --card: #ffffff;
        --line: #d8dde3;
        --text: #1e293b;
        --primary: #2563eb;
        --secondary: #475569;
        --ok: #047857;
        --error: #b91c1c;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .container {
        max-width: 1080px;
        margin: 0 auto;
        padding: 20px 12px 40px;
      }

      h1, h2 { margin-top: 0; }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 14px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
      }

      label {
        display: flex;
        flex-direction: column;
        gap: 6px;
        font-size: 13px;
        font-weight: 600;
      }

      input, select, textarea, button {
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        font-size: 14px;
      }

      button {
        cursor: pointer;
        background: var(--primary);
        color: #fff;
        border: none;
      }

      button.secondary {
        background: var(--secondary);
      }

      button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }

      .actions {
        margin-top: 12px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .inline-actions {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 8px;
        flex-wrap: wrap;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th, td {
        border: 1px solid var(--line);
        padding: 8px;
        font-size: 13px;
        text-align: left;
      }

      th { background: #eef2ff; }
      .msg { min-height: 18px; }
      .ok { color: var(--ok); }
      .err { color: var(--error); }
      .small { color: #334155; font-size: 13px; margin: 0; }
      .pill {
        display: inline-block;
        background: #ecfeff;
        border: 1px solid #bae6fd;
        color: #075985;
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 12px;
        font-weight: 600;
      }
      .hidden { display: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <div class="container">
      <h1>Timbrature Aziendali</h1>
      <p class="pill">Multi utente con login + salvataggio cloud (Supabase)</p>

      <div class="card" id="authBox">
        <h2>Accesso cloud</h2>
        <div class="grid">
          <label>Nome (solo registrazione)
            <input type="text" id="authName" placeholder="Mario Rossi" />
          </label>
          <label>Email
            <input type="email" id="authEmail" placeholder="mario@azienda.it" />
          </label>
          <label>Password
            <input type="password" id="authPassword" placeholder="almeno 6 caratteri" />
          </label>
        </div>
        <div class="inline-actions" style="margin-top: 12px;">
          <button id="loginBtn">Accedi</button>
          <button class="secondary" id="registerBtn">Registrati</button>
          <button class="secondary" id="logoutBtn">Logout</button>
          <span class="small" id="authStatus">Non autenticato.</span>
        </div>
      </div>

      <div class="card" id="userBox">
        <h2>Profilo</h2>
        <div class="grid">
          <label>Nome
            <input type="text" id="nome" placeholder="Mario Rossi" />
          </label>
          <label>Email
            <input type="email" id="email" placeholder="mario@azienda.it" readonly />
          </label>
        </div>
        <div class="inline-actions" style="margin-top: 12px;">
          <button class="secondary" id="saveProfile">Salva nome profilo</button>
          <p class="small">Ogni utente vede solo i propri dati grazie all'account personale.</p>
        </div>
      </div>

      <div class="card" id="timbratureCard">
        <h2>Nuova timbratura / giornata</h2>
        <div class="grid">
          <label>Data
            <input type="date" id="data">
          </label>

          <label>Entrata
            <input type="time" id="entrata">
          </label>

          <label>Uscita
            <input type="time" id="uscita">
          </label>

          <label>Pausa (minuti)
            <input type="number" id="pausa" min="0" value="0">
          </label>

          <label>Causale
            <select id="causale">
              <option value="LAV">LAV - Lavoro ordinario</option>
              <option value="FER">FER - Ferie</option>
              <option value="MAL">MAL - Malattia</option>
              <option value="PIO">PIO - Pioggia</option>
              <option value="PER">PER - Permesso</option>
              <option value="TRA">TRA - Trasferta</option>
              <option value="FES">FES - Festivo</option>
              <option value="SW">SW - Smart working</option>
            </select>
          </label>

          <label>Note
            <textarea id="note" rows="2" placeholder="Aggiungi dettagli se necessario"></textarea>
          </label>
        </div>

        <div class="actions">
          <button class="secondary" onclick="saveRecord('BOZZA')">Salva bozza</button>
          <button onclick="saveRecord('INVIATO')">Conferma giornata</button>
        </div>

        <p id="esito" class="msg"></p>
      </div>

      <div class="card" id="storicoCard">
        <h2>Storico mese</h2>
        <div class="inline-actions">
          <input type="month" id="mese">
          <button onclick="loadMyMonth()">Ricarica</button>
          <button class="secondary" onclick="exportData()">Esporta backup JSON</button>
        </div>
        <table>
          <thead>
            <tr>
              <th>Data</th>
              <th>Entrata</th>
              <th>Uscita</th>
              <th>Pausa</th>
              <th>Causale</th>
              <th>Ore</th>
              <th>Ordinarie</th>
              <th>Straordinario</th>
              <th>Stato</th>
            </tr>
          </thead>
          <tbody id="myRows"></tbody>
        </table>
      </div>
    </div>

    <script>
      const SUPABASE_URL = window.SUPABASE_URL || 'INSERISCI_SUPABASE_URL';
      const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || 'sb_publishable_Bjvs0ktNO_fwk9V2W3hW7w_hiln-vII';
      const CAUSALI_LAVORATIVE = ['LAV', 'SW', 'TRA'];

      const missingSupabaseConfig = [];
      if (!SUPABASE_URL || SUPABASE_URL.includes('INSERISCI_')) missingSupabaseConfig.push('SUPABASE_URL');
      if (!SUPABASE_ANON_KEY || SUPABASE_ANON_KEY.includes('INSERISCI_')) missingSupabaseConfig.push('SUPABASE_ANON_KEY');
      const isCloudConfigured = missingSupabaseConfig.length === 0;
      const supabaseClient = isCloudConfigured
        ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
        : null;

      let currentUser = null;
      let currentRules = { roundingMinutes: 15, ordinaryHours: 8 };

      function id(x) { return document.getElementById(x); }

      function showMsg(message, type = 'ok') {
        id('esito').className = `msg ${type}`;
        id('esito').textContent = message;
      }

      function parseTimeToMinutes(hhmm) {
        if (!hhmm) return null;
        const [h, m] = String(hhmm).split(':').map(Number);
        if (Number.isNaN(h) || Number.isNaN(m)) return null;
        return h * 60 + m;
      }

      function roundMinutes(minutes, step) {
        if (!step || step <= 0) return minutes;
        return Math.round(minutes / step) * step;
      }

      function computeHours(entrata, uscita, pausaMinuti, causale, rules) {
        if (!CAUSALI_LAVORATIVE.includes(causale)) {
          return { worked: 0, ord: 0, stra: 0 };
        }

        const inMin = parseTimeToMinutes(entrata);
        const outMin = parseTimeToMinutes(uscita);
        if (inMin == null || outMin == null) return { worked: 0, ord: 0, stra: 0 };

        let workedMin = outMin - inMin - (Number(pausaMinuti) || 0);
        if (workedMin < 0) workedMin = 0;

        const rounded = roundMinutes(workedMin, Number(rules.roundingMinutes || 0));
        const threshold = Number(rules.ordinaryHours || 8) * 60;
        const ordMin = Math.min(rounded, threshold);
        const straMin = Math.max(rounded - threshold, 0);

        return {
          worked: +(rounded / 60).toFixed(2),
          ord: +(ordMin / 60).toFixed(2),
          stra: +(straMin / 60).toFixed(2)
        };
      }

      function nowDateISO() {
        return new Date().toISOString().slice(0, 10);
      }

      function monthRange(monthValue) {
        const [year, month] = monthValue.split('-').map(Number);
        const start = `${year}-${String(month).padStart(2, '0')}-01`;
        const endDate = new Date(Date.UTC(year, month, 0));
        const end = `${year}-${String(month).padStart(2, '0')}-${String(endDate.getUTCDate()).padStart(2, '0')}`;
        return { start, end };
      }

      function setLoggedInUI(isLoggedIn) {
        id('timbratureCard').classList.toggle('hidden', !isLoggedIn);
        id('storicoCard').classList.toggle('hidden', !isLoggedIn);
        id('userBox').classList.toggle('hidden', !isLoggedIn);
        id('logoutBtn').disabled = !isLoggedIn;
        id('loginBtn').disabled = isLoggedIn;
        id('registerBtn').disabled = isLoggedIn;
      }

      function setProfileUI(user) {
        id('nome').value = user?.user_metadata?.full_name || '';
        id('email').value = user?.email || '';
      }

      async function register() {
        if (!supabaseClient) {
          showMsg(`Configura prima: ${missingSupabaseConfig.join(', ')}.`, 'err');
          return;
        }

        const email = id('authEmail').value.trim().toLowerCase();
        const password = id('authPassword').value;
        const fullName = id('authName').value.trim();

        const { error } = await supabaseClient.auth.signUp({
          email,
          password,
          options: { data: { full_name: fullName } }
        });

        if (error) {
          showMsg(`Registrazione fallita: ${error.message}`, 'err');
          return;
        }

        showMsg('Registrazione completata. Controlla la tua email se è richiesta la conferma.', 'ok');
      }

      async function login() {
        if (!supabaseClient) {
          showMsg(`Configura prima: ${missingSupabaseConfig.join(', ')}.`, 'err');
          return;
        }

        const email = id('authEmail').value.trim().toLowerCase();
        const password = id('authPassword').value;

        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) {
          showMsg(`Login fallito: ${error.message}`, 'err');
          return;
        }

        showMsg('Accesso effettuato.', 'ok');
      }

      async function logout() {
        if (!supabaseClient) return;
        await supabaseClient.auth.signOut();
        showMsg('Logout effettuato.', 'ok');
      }

      async function saveProfile() {
        if (!supabaseClient || !currentUser) return;

        const fullName = id('nome').value.trim();
        const { error } = await supabaseClient.auth.updateUser({
          data: { full_name: fullName }
        });

        if (error) {
          showMsg(`Errore salvataggio profilo: ${error.message}`, 'err');
          return;
        }

        showMsg('Profilo aggiornato nel cloud.', 'ok');
      }

      function collectPayload(stato) {
        return {
          data: id('data').value || nowDateISO(),
          entrata: id('entrata').value,
          uscita: id('uscita').value,
          pausaMinuti: Number(id('pausa').value || 0),
          causale: id('causale').value,
          note: id('note').value,
          stato
        };
      }

      async function saveRecord(stato) {
        if (!supabaseClient || !currentUser) {
          showMsg('Devi essere autenticato.', 'err');
          return;
        }

        const payload = collectPayload(stato);
        const calc = computeHours(
          payload.entrata,
          payload.uscita,
          payload.pausaMinuti,
          payload.causale,
          currentRules
        );

        const row = {
          user_id: currentUser.id,
          email: currentUser.email,
          nome: id('nome').value.trim(),
          data: payload.data,
          entrata: payload.entrata,
          uscita: payload.uscita,
          pausa: payload.pausaMinuti,
          causale: payload.causale,
          note: payload.note,
          ore: calc.worked,
          ord: calc.ord,
          stra: calc.stra,
          stato: payload.stato,
          updated_at: new Date().toISOString()
        };

        const { data: existing, error: readError } = await supabaseClient
          .from('timbrature_records')
          .select('id')
          .eq('user_id', currentUser.id)
          .eq('data', payload.data)
          .maybeSingle();

        if (readError) {
          showMsg(`Errore lettura: ${readError.message}`, 'err');
          return;
        }

        let writeError;
        if (existing?.id) {
          ({ error: writeError } = await supabaseClient
            .from('timbrature_records')
            .update(row)
            .eq('id', existing.id));
        } else {
          ({ error: writeError } = await supabaseClient
            .from('timbrature_records')
            .insert(row));
        }

        if (writeError) {
          showMsg(`Errore salvataggio cloud: ${writeError.message}`, 'err');
          return;
        }

        showMsg(`Salvato nel cloud. Ore: ${calc.worked}, Ordinarie: ${calc.ord}, Straordinario: ${calc.stra}`, 'ok');
        await loadMyMonth();
      }

      async function loadMyMonth() {
        if (!supabaseClient || !currentUser) {
          id('myRows').innerHTML = '';
          return;
        }

        const month = id('mese').value;
        const { start, end } = monthRange(month);

        const { data, error } = await supabaseClient
          .from('timbrature_records')
          .select('data, entrata, uscita, pausa, causale, ore, ord, stra, stato')
          .eq('user_id', currentUser.id)
          .gte('data', start)
          .lte('data', end)
          .order('data', { ascending: true });

        if (error) {
          showMsg(`Errore caricamento storico: ${error.message}`, 'err');
          return;
        }

        id('myRows').innerHTML = (data || []).map((r) => `
          <tr>
            <td>${r.data || ''}</td>
            <td>${r.entrata || ''}</td>
            <td>${r.uscita || ''}</td>
            <td>${r.pausa || 0}</td>
            <td>${r.causale || ''}</td>
            <td>${r.ore || 0}</td>
            <td>${r.ord || 0}</td>
            <td>${r.stra || 0}</td>
            <td>${r.stato || ''}</td>
          </tr>`).join('');
      }

      async function exportData() {
        if (!supabaseClient || !currentUser) {
          showMsg('Devi essere autenticato.', 'err');
          return;
        }

        const { data, error } = await supabaseClient
          .from('timbrature_records')
          .select('*')
          .eq('user_id', currentUser.id)
          .order('data', { ascending: true });

        if (error) {
          showMsg(`Errore export: ${error.message}`, 'err');
          return;
        }

        const blob = new Blob([JSON.stringify({ records: data || [] }, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `timbrature-cloud-backup-${new Date().toISOString().slice(0, 10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
      }

      async function refreshSession() {
        if (!supabaseClient) {
          id('authStatus').textContent = `Configura Supabase (${missingSupabaseConfig.join(', ')}) per usare login e cloud.`;
          setLoggedInUI(false);
          showMsg(`Imposta ${missingSupabaseConfig.join(' e ')} nel file index.html.`, 'err');
          return;
        }

        const { data } = await supabaseClient.auth.getUser();
        currentUser = data.user;

        if (!currentUser) {
          id('authStatus').textContent = 'Non autenticato.';
          setLoggedInUI(false);
          id('myRows').innerHTML = '';
          return;
        }

        setProfileUI(currentUser);
        id('authStatus').textContent = `Connesso come ${currentUser.email}`;
        setLoggedInUI(true);
        await loadMyMonth();
      }

      async function init() {
        id('data').value = nowDateISO();
        const now = new Date();
        id('mese').value = `${now.getUTCFullYear()}-${String(now.getUTCMonth() + 1).padStart(2, '0')}`;

        id('loginBtn').addEventListener('click', login);
        id('registerBtn').addEventListener('click', register);
        id('logoutBtn').addEventListener('click', logout);
        id('saveProfile').addEventListener('click', saveProfile);

        if (supabaseClient) {
          supabaseClient.auth.onAuthStateChange(async () => {
            await refreshSession();
          });
        }

        await refreshSession();
      }

      window.onload = init;
    </script>
  </body>
</html>
